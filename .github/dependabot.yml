version: 2
updates:
  # App dependencies (root)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Collapse routine minor/patch bumps into one PR to cut noise.
      minor-and-patch:
        update-types: ["minor", "patch"]
    # Defer breaking majors that need a deliberate, tested migration rather than
    # an auto-merge. Tailwind 4 (#105, closed 2026-05-29) is a CSS-first rewrite
    # that requires rewriting tailwind.config.js. Patch/minor still flow; delete
    # the entry when ready to take that migration on.
    # (React 19 was completed 2026-05-29, so its major ignore was removed here.)
    ignore:
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    labels: ["dependencies"]

  # Pipeline scripts have their own lockfile.
  - package-ecosystem: npm
    directory: "/scripts/pipeline"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: ["dependencies", "pipeline"]

  # Keep GitHub Actions pinned versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["ci"]

version: 2
updates:
  # App dependencies (root)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Collapse routine minor/patch bumps into one PR to cut noise.
      minor-and-patch:
        update-types: ["minor", "patch"]
    # Defer breaking majors that need a deliberate, tested migration rather than
    # an auto-merge. Patch/minor still flow; delete an entry when ready to migrate.
    #   - eslint 10: blocked upstream — eslint-plugin-react / jsx-a11y don't yet
    #     declare ESLint 10 peer support (would need repo-wide legacy-peer-deps).
    # (React 19, web-vitals 5, Vite 8 + plugin-react 6, and Tailwind 4 were all
    #  completed 2026-05-29/30, so they're not here.)
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    labels: ["dependencies"]

  # Pipeline scripts have their own lockfile.
  - package-ecosystem: npm
    directory: "/scripts/pipeline"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: ["dependencies", "pipeline"]

  # Keep GitHub Actions pinned versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["ci"]

name: Daily Movie Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:

jobs:
  discover:
    name: Discover & Process New Movies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'scripts/pipeline/package-lock.json'
      
      - name: Install dependencies in scripts directory
        working-directory: ./scripts
        run: |
          # Copy package files to scripts directory
          cp pipeline/package.json .
          cp pipeline/package-lock.json .
          npm ci
      
      - name: Run discovery pipeline
        working-directory: ./scripts/pipeline
        run: node run-pipeline.js discover
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/*.log
          retention-days: 7
      
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const titlePrefix = '⚠️ Daily Pipeline Failed';
            const rollingTitle = '⚠️ Daily Pipeline Failed (rolling)';
            const now = new Date().toISOString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commentBody =
              `Daily pipeline failed again at ${now}.\n\n` +
              `Workflow run: ${runUrl}`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const existingIssue = openIssues.find((issue) =>
              !issue.pull_request &&
              issue.title.startsWith(titlePrefix)
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: commentBody
              });
              core.info(`Commented on existing issue #${existingIssue.number}`);
            } else {
              const createResult = await github.rest.issues.create({
                owner,
                repo,
                title: rollingTitle,
                body:
                  `The daily movie discovery pipeline has failed.\n\n` +
                  `First failure in this rolling issue: ${now}\n` +
                  `Workflow run: ${runUrl}\n\n` +
                  `Subsequent failures will be added as comments until the workflow is healthy again.`,
                labels: ['bug', 'automation']
              });
              core.info(`Created rolling issue #${createResult.data.number}`);
            }

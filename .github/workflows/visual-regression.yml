name: Visual & A11y Regression

on:
  pull_request:
    paths:
      - 'src/**'
      - 'index.html'
      - 'e2e/visual/**'
      - 'e2e/visual-auth/**'
      - 'e2e/fixtures/discover.js'
      - 'playwright.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/visual-regression.yml'
  # Push to a `visual-baselines/<name>` branch to (re)generate the Linux
  # baselines. Snapshots are platform-specific and Docker isn't available
  # locally, so the only way to produce Linux baselines is in this CI env.
  # The job regenerates them and commits them back to that branch; open a PR
  # from it to land the refreshed baselines.
  push:
    branches:
      - 'visual-baselines/**'

permissions:
  contents: write

jobs:
  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression
        env:
          # The visual surfaces (/, /about) are logged-out and static — the app
          # only needs the Supabase client to instantiate, so dummy values are
          # enough. No real secrets required, so this gate always runs (unlike
          # the auth E2E job, which skips until secrets are configured).
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy-anon-key
          VITE_TMDB_API_KEY: dummy
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/visual-baselines/* ]]; then
            echo "Regenerating Linux baselines…"
            npm run test:visual:update
          else
            npm run test:visual
          fi

      # Runtime a11y on the logged-out surfaces (same dummy env). Fails on
      # serious/critical WCAG violations excluding color-contrast, which is a
      # deliberate editorial-design choice tracked separately. Authenticated
      # a11y (/home, /movie) runs via the secret-gated E2E job + locally.
      - name: Accessibility (logged-out surfaces)
        if: ${{ !startsWith(github.ref, 'refs/heads/visual-baselines/') }}
        env:
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy-anon-key
          VITE_TMDB_API_KEY: dummy
        run: npx playwright test --project=public e2e/public/a11y.e2e.js

      - name: Commit regenerated baselines
        if: ${{ startsWith(github.ref, 'refs/heads/visual-baselines/') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/visual
          if git diff --cached --quiet; then
            echo "No baseline changes."
          else
            # No [skip ci] needed: pushes authored by GITHUB_TOKEN don't trigger
            # further workflow runs, and we WANT the eventual PR to run the gate.
            git commit -m "test(visual): regenerate Linux baselines"
            git push
          fi

      - name: Upload diff on failure (PR gate)
        if: ${{ failure() && !startsWith(github.ref, 'refs/heads/visual-baselines/') }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-diff
          path: test-results/
          retention-days: 7

  # Authenticated Discover visual regression. Separate from the public `visual`
  # job: it signs in the dev test user (real /auth/v1) and renders /discover with
  # the deterministic interception fixture — every Discover read/write is mocked,
  # so no Discover row is touched. Needs the same secrets as the E2E gate; if they
  # are absent it skips with a notice rather than falsely reporting a pass. Runs
  # after the public `visual` job so the two never race when committing baselines
  # on a visual-baselines/** push (they touch different snapshot directories).
  visual-app:
    name: Visual Regression — Authenticated Discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: visual
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Secret preflight
        id: preflight
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: |
          if [ -z "$E2E_TEST_EMAIL" ] || [ -z "$E2E_TEST_PASSWORD" ] || \
             [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ] || \
             [ -z "$VITE_TMDB_API_KEY" ]; then
            echo "::warning title=Authenticated Discover visuals skipped::Required secrets (E2E_TEST_EMAIL/PASSWORD, VITE_SUPABASE_URL/ANON_KEY, VITE_TMDB_API_KEY) are not configured. The authenticated Discover visual job did NOT run."
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run authenticated Discover visuals
        if: ${{ steps.preflight.outputs.has_secrets == 'true' }}
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/visual-baselines/* ]]; then
            echo "Regenerating Linux authenticated Discover baselines…"
            npm run test:visual:app:update
          else
            npm run test:visual:app
          fi

      - name: Commit regenerated authenticated baselines
        if: ${{ steps.preflight.outputs.has_secrets == 'true' && startsWith(github.ref, 'refs/heads/visual-baselines/') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only the authenticated Discover snapshots — never public baselines.
          git add 'e2e/visual-auth/discover.visual.js-snapshots'
          if git diff --cached --quiet; then
            echo "No authenticated baseline changes."
          else
            # Rebase in any commit the public `visual` job pushed first (different dir).
            git pull --rebase origin "${GITHUB_REF#refs/heads/}" || true
            git commit -m "test(visual): regenerate Linux authenticated Discover baselines"
            git push
          fi

      - name: Upload authenticated diff on failure (PR gate)
        if: ${{ failure() && !startsWith(github.ref, 'refs/heads/visual-baselines/') }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-diff-app
          path: test-results/
          retention-days: 7
